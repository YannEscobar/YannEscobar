name: Update GitHub Stats
on:
  schedule:
    - cron: '0 * * * *'     # every hour
  workflow_dispatch:        # manual trigger

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch stats image
        run: |
          curl -sSf "https://github-readme-stats.vercel.app/api?username=YannEscobar&theme=dark&show_icons=true&count_private=true&include_all_commits=true&hide_border=true" -o gh-stats.svg

      - name: Commit & push image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q 'gh-stats.svg'; then
            git add gh-stats.svg
            git commit -m "chore: update github stats image"
            git push
          else
            echo "No changes to commit"
          fi
